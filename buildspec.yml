version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - pip install -r requirements.txt
  build:
    commands:
      - echo Build started on `date`
      # Her kan du legge til tester hvis du har det
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - "**/*"
